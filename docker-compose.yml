version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: storeit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: akhil123
      POSTGRES_DB: zidoc__
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: storeit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
